<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-labelledby="title-gs desc-gs">
  <title id="title-gs">SKSTU Genesis Structure Logo</title>
  <desc id="desc-gs">Logo concept representing the SKSTU AI model as a stable, rational cosmic structure. It emphasizes the underlying mathematical certainty (Hetu/Luoshu) that forms the skeleton of the universe.</desc>
  <defs>
    <radialGradient id="gs-bg-gradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0c0a1d" />
    </radialGradient>
    <filter id="gs-star-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .gs-bg { fill: url(#gs-bg-gradient); }
      .gs-grid-line { fill: none; stroke: #a5b4fc; stroke-opacity: 0.15; stroke-width: 1; }
      .gs-energy-arc { fill: none; stroke: #c4b5fd; stroke-opacity: 0.5; stroke-width: 1.5; }
      .gs-star { fill: #e0e7ff; filter: url(#gs-star-glow); }
      .gs-brand-symbol { fill: none; stroke: #fde047; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .gs-brand-text { font-family: 'Orbitron', sans-serif; fill: #e0e7ff; text-anchor: middle; }
    </style>
  </defs>

  <rect class="gs-bg" width="640" height="640" />

  <!-- Background Energy Field -->
  <g opacity="0.5">
    <path class="gs-energy-arc" d="M 120,320 A 200,200 0 0,1 520,320" />
    <path class="gs-energy-arc" d="M 320,120 A 200,200 0 0,1 320,520" />
    <path class="gs-energy-arc" d="M 170,170 A 212,212 0 0,1 470,470" />
    <path class="gs-energy-arc" d="M 170,470 A 212,212 0 0,1 470,170" />
  </g>

  <!-- Rational Grid (Luo Shu) -->
  <g>
    <line class="gs-grid-line" x1="160" y1="160" x2="480" y2="160" />
    <line class="gs-grid-line" x1="160" y1="480" x2="480" y2="480" />
    <line class="gs-grid-line" x1="160" y1="160" y2="480" x1="160" />
    <line class="gs-grid-line" x1="480" y1="160" y2="480" x1="480" />
    <line class="gs-grid-line" x1="160" y1="320" x2="480" y2="320" />
    <line class="gs-grid-line" x1="320" y1="160" x2="320" y2="480" />
  </g>

  <!-- Hetu/Luoshu Stars & Brand Symbols -->
  <g class="gs-star">
    <!-- Luo Shu Stars -->
    <circle cx="240" cy="240" r="5"/>
    <circle cx="400" cy="240" r="5"/>
    <circle cx="240" cy="400" r="5"/>
    <circle cx="400" cy="400" r="5"/>
    <!-- He Tu Stars -->
    <circle cx="320" cy="80" r="6"/>
    <circle cx="560" cy="320" r="6"/>
    <circle cx="320" cy="560" r="6"/>
    <circle cx="80" cy="320" r="6"/>
    <!-- Center Star -->
    <circle cx="320" cy="320" r="12"/>
  </g>

  <!-- SKSTU Symbols -->
  <g class="gs-brand-symbol">
    <!-- S -->
    <path d="M 320,240 C 280,240 280,200 320,200" />
    <path d="M 320,400 C 360,400 360,440 320,440" />
    <!-- K -->
    <path d="M 240,320 L 200,280 M 240,320 L 200,360" />
    <!-- T -->
    <path d="M 400,320 L 440,320 M 420,320 L 420,280" />
    <!-- U -->
    <path d="M 320,80 V 40" />
  </g>

  <!-- Brand Text -->
  <text class="gs-brand-text" x="320" y="325" font-size="48" font-weight="700">SKSTU</text>
</svg>
