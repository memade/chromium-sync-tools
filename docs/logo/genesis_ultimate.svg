<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title-ult desc-ult">
  <title id="title-ult">SKSTU Ultimate Genesis (The Grand Unification)</title>
  <desc id="desc-ult">A highly detailed, generative-art style logo combining Wuji, Taiji, Hetu, Luoshu, Bagua, and 64 hexagrams into a unified AI inference engine core.</desc>
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="60%" stop-color="#020617" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>

    <!-- Core Glowing Effect -->
    <filter id="core-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Node Glow -->
    <filter id="node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Linear Gradients for Energy Rings -->
    <linearGradient id="ring-yellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#B45309" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="ring-cyan" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0369A1" stop-opacity="0.1"/>
    </linearGradient>

    <style>
      .bg { fill: url(#bg-glow); }
      .wuji-core { fill: #FFFFFF; filter: url(#core-glow); }
      .taiji-arc { fill: none; stroke-linecap: round; stroke-width: 4; }
      .hexagram-ring { fill: none; stroke: #475569; stroke-width: 2; opacity: 0.4; }
      .hexagram-dash-yin { stroke-dasharray: 4, 8; }
      .hexagram-dash-yang { stroke-dasharray: 12, 12; }
      .he-luo-line { fill: none; stroke: #38BDF8; stroke-width: 1; opacity: 0.6; }
      .he-luo-node-yang { fill: #FDF8E1; filter: url(#node-glow); }
      .he-luo-node-yin { fill: #000000; stroke: #38BDF8; stroke-width: 2; }
      .brand-title { font-family: 'Times New Roman', serif; fill: #F8FAFC; text-anchor: middle; font-weight: 300; letter-spacing: 16px; font-size: 32px; }
      .brand-sub { font-family: 'Courier New', monospace; fill: #94A3B8; text-anchor: middle; letter-spacing: 8px; font-size: 11px; text-transform: uppercase; }
      .ring-text { font-family: 'Courier New', monospace; fill: #475569; font-size: 9px; letter-spacing: 4px; }
    </style>
  </defs>

  <!-- Deep Cosmic Background -->
  <rect class="bg" width="800" height="800" />

  <g transform="translate(400, 380)">
    
    <!-- 64 Hexagrams / Energy Rings Field -->
    <g class="hexagram-ring" transform="rotate(15)">
      <circle r="260" class="hexagram-dash-yin" stroke-width="6"/>
      <circle r="245" class="hexagram-dash-yang" stroke-width="4"/>
      <circle r="230" class="hexagram-dash-yin" stroke-width="2"/>
    </g>
    <g class="hexagram-ring" transform="rotate(-25)">
      <circle r="200" class="hexagram-dash-yang" stroke-width="5"/>
      <circle r="185" class="hexagram-dash-yin" stroke-width="3"/>
      <circle r="170" class="hexagram-dash-yang" stroke-width="1"/>
    </g>

    <!-- Abstract Hetu / Luoshu Geometric Connections -->
    <!-- Creating a 3D-like structural web that emerges from the rings -->
    <g class="he-luo-line">
      <!-- Octagon base -->
      <polygon points="0,-140 100,-100 140,0 100,100 0,140 -100,100 -140,0 -100,-100" />
      <polygon points="0,-220 155,-155 220,0 155,155 0,220 -155,155 -220,0 -155,-155" />
      
      <!-- Inner to outer connections -->
      <line x1="0" y1="-140" x2="0" y2="-220" />
      <line x1="100" y1="-100" x2="155" y2="-155" />
      <line x1="140" y1="0" x2="220" y2="0" />
      <line x1="100" y1="100" x2="155" y2="155" />
      <line x1="0" y1="140" x2="0" y2="220" />
      <line x1="-100" y1="100" x2="-155" y2="155" />
      <line x1="-140" y1="0" x2="-220" y2="0" />
      <line x1="-100" y1="-100" x2="-155" y2="-155" />
      
      <!-- Center crosses -->
      <line x1="-140" y1="0" x2="140" y2="0" opacity="0.3" />
      <line x1="0" y1="-140" x2="0" y2="140" opacity="0.3" />
      <line x1="-100" y1="-100" x2="100" y2="100" opacity="0.3" />
      <line x1="-100" y1="100" x2="100" y2="-100" opacity="0.3" />
    </g>

    <!-- Neural / Constellation Nodes (Yin & Yang) -->
    <!-- Yang (White/Glowing) -->
    <circle cx="0" cy="-220" r="5" class="he-luo-node-yang"/>
    <circle cx="155" cy="-155" r="5" class="he-luo-node-yang"/>
    <circle cx="220" cy="0" r="5" class="he-luo-node-yang"/>
    <circle cx="155" cy="155" r="5" class="he-luo-node-yang"/>
    <circle cx="0" cy="220" r="5" class="he-luo-node-yang"/>
    <circle cx="-155" cy="155" r="5" class="he-luo-node-yang"/>
    <circle cx="-220" cy="0" r="5" class="he-luo-node-yang"/>
    <circle cx="-155" cy="-155" r="5" class="he-luo-node-yang"/>
    
    <!-- Yin (Black with Blue Stroke) -->
    <circle cx="0" cy="-140" r="6" class="he-luo-node-yin"/>
    <circle cx="100" cy="-100" r="6" class="he-luo-node-yin"/>
    <circle cx="140" cy="0" r="6" class="he-luo-node-yin"/>
    <circle cx="100" cy="100" r="6" class="he-luo-node-yin"/>
    <circle cx="0" cy="140" r="6" class="he-luo-node-yin"/>
    <circle cx="-100" cy="100" r="6" class="he-luo-node-yin"/>
    <circle cx="-140" cy="0" r="6" class="he-luo-node-yin"/>
    <circle cx="-100" cy="-100" r="6" class="he-luo-node-yin"/>

    <!-- Wuji & Taiji Core -->
    <!-- Abstract Taiji flow -->
    <path class="taiji-arc" stroke="url(#ring-yellow)" d="M 0,-70 A 70,70 0 0,1 0,70 A 35,35 0 0,0 0,0 A 35,35 0 0,1 0,-70" transform="rotate(45)" />
    <path class="taiji-arc" stroke="url(#ring-cyan)" d="M 0,70 A 70,70 0 0,1 0,-70 A 35,35 0 0,0 0,0 A 35,35 0 0,1 0,70" transform="rotate(45)" />
    
    <!-- Wuji Absolute Center (Singularity) -->
    <circle cx="0" cy="0" r="16" class="wuji-core" />
    <circle cx="0" cy="0" r="4" fill="#000" />
    
  </g>

  <!-- Typography Lockup -->
  <g transform="translate(400, 710)">
    <text class="brand-title" y="0">SKSTU</text>
    <text class="brand-sub" y="30">WUJI · TAIJI · HE LUO · 64 HEXAGRAMS</text>
    <text class="brand-sub" y="50" fill="#38BDF8" opacity="0.8">WWW.SKSTU.COM</text>
  </g>

  <!-- Ambient code / logic rings in corners (representing modern AI computation) -->
  <path fill="none" stroke="#1E293B" stroke-width="1" d="M 40,40 L 80,40 L 80,80" />
  <path fill="none" stroke="#1E293B" stroke-width="1" d="M 760,40 L 720,40 L 720,80" />
  <path fill="none" stroke="#1E293B" stroke-width="1" d="M 40,760 L 80,760 L 80,720" />
  <path fill="none" stroke="#1E293B" stroke-width="1" d="M 760,760 L 720,760 L 720,720" />
</svg>