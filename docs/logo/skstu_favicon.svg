<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">SKSTU favicon</title>
  <desc id="desc">A minimal SKSTU S/K monogram for small app icons and favicons.</desc>
